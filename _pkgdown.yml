url: https://rdastgh1.github.io/SciDataReportR/
template:
  bootstrap: 5

home:
  title: Workflow infrastructure for reproducible scientific data reporting
  description: >
    Turn labelled life science data frames into metadata-aware exploratory
    analyses, statistical comparisons, projections, scientific visualizations,
    and report-ready outputs.

navbar:
  structure:
    left: [intro, workflows, visualizations, reference, news]
    right: [github]
  components:
    intro:
      text: Get started
      href: index.html
    workflows:
      text: Workflows
      menu:
      - text: Data setup and metadata
        href: reference/index.html#data-setup-metadata-and-codebooks
      - text: Statistical comparison workflows
        href: reference/index.html#statistical-comparison-workflows
      - text: Projection and clustering workflows
        href: reference/index.html#dimensionality-reduction-projection-and-clustering
      - text: Longitudinal workflows
        href: reference/index.html#longitudinal-and-temporal-workflows
    visualizations:
      text: Visualizations
      href: reference/index.html#visualization-functions

articles:
- title: Getting started
  navbar: Get started
  contents:
  - getting-started

